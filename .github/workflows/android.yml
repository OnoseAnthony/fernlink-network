name: Android SDK

on:
  push:
    paths:
      - "packages/android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "packages/android/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    name: Build Android SDK + demo app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35 and build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/android/**/*.gradle.kts', 'packages/android/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build SDK (release)
        run: gradle :fernlink-sdk:assembleRelease --no-daemon

      - name: Build demo app (debug)
        run: gradle :fernlink-demo-app:assembleDebug --no-daemon

      - name: Upload demo APK
        uses: actions/upload-artifact@v4
        with:
          name: fernlink-demo-debug
          path: packages/android/fernlink-demo-app/build/outputs/apk/debug/**.apk
          retention-days: 14
