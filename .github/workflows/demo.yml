name: Demo publish

on:
  push:
    branches: [main]
    paths:
      - "packages/demo/**"
      - ".github/workflows/demo.yml"

jobs:
  publish:
    name: Type-check, build, and publish fernlink-demo
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version-bump commit back

    defaults:
      run:
        working-directory: packages/demo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version patch -m "chore(demo): bump to %s [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
