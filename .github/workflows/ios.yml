name: iOS SDK

on:
  push:
    paths:
      - "packages/ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "packages/ios/**"
      - ".github/workflows/ios.yml"

jobs:
  build-and-test:
    name: Build and test iOS SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test
