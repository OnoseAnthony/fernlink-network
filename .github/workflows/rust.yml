name: Rust

on:
  push:
    paths:
      - "packages/fernlink-core/**"
      - "packages/android/fernlink-core-ffi/**"
      - "packages/ble-desktop/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "packages/fernlink-core/**"
      - "packages/android/fernlink-core-ffi/**"
      - "packages/ble-desktop/**"
      - ".github/workflows/rust.yml"

jobs:
  test-core:
    name: fernlink-core tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/fernlink-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/fernlink-core/target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('packages/fernlink-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-core-

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

  build-desktop:
    name: ble-desktop build (BLE + WiFi transport)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ble-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux BLE dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/ble-desktop/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('packages/ble-desktop/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: Build
        run: cargo build --all-features

  check-ffi:
    name: fernlink-core-ffi check (Android targets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/android/fernlink-core-ffi

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/android/fernlink-core-ffi/target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('packages/android/fernlink-core-ffi/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ffi-

      - name: Check arm64-v8a
        run: cargo check --target aarch64-linux-android

      - name: Check armeabi-v7a
        run: cargo check --target armv7-linux-androideabi

      - name: Check x86_64
        run: cargo check --target x86_64-linux-android

  publish-core:
    name: Bump version and publish fernlink-core
    runs-on: ubuntu-latest
    needs: [test-core, build-desktop, check-ffi]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write   # required for crates.io Trusted Publishing (OIDC)
    defaults:
      run:
        working-directory: packages/fernlink-core

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main   # always start from latest main, not the triggering SHA

      - name: Sync to latest main
        run: git pull origin main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/fernlink-core/target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('packages/fernlink-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-core-

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          OLD=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          IFS='.' read -r maj min pat <<< "$OLD"
          NEW="$maj.$min.$((pat + 1))"
          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" Cargo.toml
          git add Cargo.toml
          git commit -m "chore(core): bump to $NEW [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
