[package]
name = "fernlink-core"
version = "0.2.0"
edition = "2021"
description = "Core cryptographic primitives and protocol implementation for the Fernlink mesh verification network"
license = "Apache-2.0"
repository = "https://github.com/Fernlink-Protocol/fernlink-network"
keywords = ["solana", "blockchain", "mesh", "p2p", "verification"]
categories = ["cryptography", "network-programming"]

[dependencies]
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-big-array = "0.5"
sha2 = "0.10"
hex = "0.4"
bs58 = "0.5"
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
reqwest  = { version = "0.11", features = ["json", "blocking"], optional = true }
lz4_flex = { version = "0.11", optional = true }
zstd     = { version = "0.13", default-features = false, optional = true }

[features]
default     = ["rpc", "lz4", "zstd"]
rpc         = ["dep:reqwest"]
lz4         = ["dep:lz4_flex"]
zstd        = ["dep:zstd"]
compression = ["lz4", "zstd"]  # convenience alias

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }

[lib]
name = "fernlink_core"
path = "src/lib.rs"
