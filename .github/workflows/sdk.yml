name: TypeScript SDK

on:
  push:
    paths:
      - "packages/sdk/**"
      - "packages/demo/**"
      - "packages/ble/**"
      - "packages/wifi/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    paths:
      - "packages/sdk/**"
      - "packages/demo/**"
      - "packages/ble/**"
      - "packages/wifi/**"
      - ".github/workflows/sdk.yml"

jobs:
  test-sdk:
    name: fernlink-sdk tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  check-demo:
    name: demo CLI type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/demo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  check-wifi:
    name: WiFi/TCP transport type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Build SDK (peer dependency)
        working-directory: packages/sdk
        run: npm ci && npm run build

      - name: Install WiFi dependencies
        working-directory: packages/wifi
        run: npm ci

      - name: Type-check
        working-directory: packages/wifi
        run: npx tsc --noEmit

  publish-demo:
    name: Bump version and publish fernlink-demo
    runs-on: ubuntu-latest
    needs: [test-sdk, check-demo]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write   # required for npm Trusted Publishing (OIDC)
    defaults:
      run:
        working-directory: packages/demo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main   # always start from latest main, not the triggering SHA

      - name: Sync to latest main
        run: git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version patch -m "chore(demo): bump to %s [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to npm
        run: npm publish --provenance --access public

  publish-sdk:
    name: Bump version and publish fernlink-sdk
    runs-on: ubuntu-latest
    needs: [test-sdk, check-demo, check-wifi, test-ble-simulator]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write   # required for npm Trusted Publishing (OIDC)
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main   # always start from latest main, not the triggering SHA

      - name: Sync to latest main
        run: git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version patch -m "chore(sdk): bump to %s [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to npm
        run: npm publish --provenance --access public

  test-ble-simulator:
    name: BLE simulator tests + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ble

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/ble/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run simulator tests
        run: npm test
